name: Compress Performer Covers
description: Compress oversized performer covers to AVIF with Stash's FFmpeg
version: 0.3.0
url: https://github.com/xypat/stash-plugins

exec:
  - python3
  - "{pluginDir}/main.py"

interface: raw
errLog: info

settings:
  target_kb:
    displayName: Target size (KiB, default 100)
    description: Covers at or below this size are skipped; built-in default is 100
    type: NUMBER
  max_width:
    displayName: Maximum width (default 720)
    description: Covers wider than this value are resized; built-in default is 720
    type: NUMBER
  min_quality:
    displayName: Minimum quality (default 60)
    description: Lowest allowed AVIF quality from 1 to 95; built-in default is 60
    type: NUMBER
  concurrency:
    displayName: Concurrency (default 3)
    description: Number of covers processed at the same time; built-in default is 3
    type: NUMBER
  limit:
    displayName: Performer limit (default 0)
    description: Maximum performers to inspect; built-in default 0 means all
    type: NUMBER
  ffmpeg_path:
    displayName: FFmpeg path override
    description: Leave empty to use the FFmpeg configured in Stash
    type: STRING

tasks:
  - name: Reset settings to defaults
    description: Save the built-in defaults so their actual values appear in the plugin UI
    defaultArgs:
      reset_settings: true
  - name: Preview compression
    description: Inspect and compress covers without writing changes to Stash
    defaultArgs:
      apply: false
  - name: Compress performer covers
    description: Compress oversized covers to AVIF and write them back to Stash
    defaultArgs:
      apply: true

hooks:
  - name: Compress updated performer cover
    description: Compress a performer cover after the image field is updated
    triggeredBy:
      - Performer.Update.Post
    defaultArgs:
      apply: true
